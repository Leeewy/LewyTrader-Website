  <script>
(function () {
  var key = "lewytrader-theme";
  var theme = "light";
  try {
    var stored = localStorage.getItem(key);
    if (stored === "light" || stored === "dark") {
      theme = stored;
    } else if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
      theme = "dark";
    }
  } catch (err) {
    if (window.matchMedia("(prefers-color-scheme: dark)").matches) {
      theme = "dark";
    }
  }
  document.documentElement.setAttribute("data-theme", theme);

  window.LewyTrader = window.LewyTrader || {};
  window.LewyTrader.toggleTheme = function () {
    var html = document.documentElement;
    var current = html.getAttribute("data-theme") === "dark" ? "dark" : "light";
    var next = current === "dark" ? "light" : "dark";
    try {
      localStorage.setItem(key, next);
    } catch (err) {
      // Ignore storage failures (private mode, file:// restrictions).
    }
    html.setAttribute("data-theme", next);
    document.dispatchEvent(
      new CustomEvent("lewytrader-theme-change", { detail: { theme: next } })
    );
    if (typeof window.LewyTrader.updateThemeToggle === "function") {
      window.LewyTrader.updateThemeToggle();
    }
  };
})();
</script>
